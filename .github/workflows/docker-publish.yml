name: Build and Publish Docker Image

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

# ── Permissions required for GHCR publish ────────────────────────────────────
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.platform }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      # ── 1. Checkout source ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lower case repository name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      # ── 2. Prepare platform-specific Docker tag slug ────────────────────────
      - name: Prepare platform slug
        id: slug
        run: |
          PLATFORM_SLUG="${{ matrix.platform }}"
          echo "slug=${PLATFORM_SLUG//\//-}" >> "$GITHUB_OUTPUT"

      # ── 3. Register QEMU binfmt handlers (enables arm64 & i386 emulation) ──
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 4. Create a multi-platform-capable buildx builder ───────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Authenticate to GitHub Container Registry ────────────────────────
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Generate OCI-compliant image tags and labels ─────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO }}
          # Tag rules:
          #   • On version tags (v1.2.3):  latest, 1, 1.2, 1.2.3
          #   • On branch push (main):     main, latest
          #   • All events:                sha-<short>
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,format=short

      # ── 7. Build the image for the current platform ─────────────────────────
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # Store the build in the cache; push the per-platform digest to GHCR
          # so the merge step below can assemble the multi-arch manifest.
          outputs: "type=image,name=ghcr.io/${{ env.REPO }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}"
          cache-from: type=gha,scope=${{ steps.slug.outputs.slug }}
          cache-to: type=gha,mode=max,scope=${{ steps.slug.outputs.slug }}

      # ── 8. Export the image digest so the merge job can reference it ─────────
      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.slug.outputs.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Merge per-platform digests into a single multi-arch manifest ─────────────
  merge:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs:
      - build-and-push

    steps:
      - name: Set lower case repository name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Download amd64 digest
        uses: actions/download-artifact@v4
        with:
          name: digests-linux-amd64
          path: /tmp/digests

      - name: Download arm64 digest
        uses: actions/download-artifact@v4
        with:
          name: digests-linux-arm64
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,format=short

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ env.REPO }}@sha256:%s ' *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ env.REPO }}:${{ steps.meta.outputs.version }}
